services:
  # PostgreSQL Database (Render's managed PostgreSQL)
  - type: postgresql
    name: chat-app-db
    plan: free
    ipAllowList: []  # Allow all connections (for development)
    
  # Redis Database (Render's managed Redis)
  - type: redis
    name: chat-app-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction
    
  # Web Service (FastAPI)
  - type: web
    name: chat-app-api
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chat-app-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chat-app-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: DEBUG
        value: false