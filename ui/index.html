<!-- test_client.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Chat Client Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .chat-container { max-width: 600px; margin: auto; }
        .messages { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 5px; }
        .own-message { background-color: #e3f2fd; text-align: right; }
        .other-message { background-color: #f5f5f5; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; }
        button { padding: 10px 20px; }
        .status { margin-top: 10px; padding: 5px; background-color: #f0f0f0; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Chat Client Test</h2>
        <div>
            <label>User ID: </label>
            <input type="number" id="userId" placeholder="Your user ID">
            <label>Token: </label>
            <input type="text" id="token" placeholder="JWT Token" style="width: 300px;">
            <button onclick="connect()">Connect</button>
        </div>
        <div class="status" id="status">Disconnected</div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <input type="number" id="receiverId" placeholder="Receiver User ID">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let ws = null;
        let userId = null;
        
        function connect() {
            userId = document.getElementById('userId').value;
            const token = document.getElementById('token').value;
            
            if (!userId) {
                alert('Please enter user ID');
                return;
            }
            
            ws = new WebSocket(`ws://localhost:8000/ws/${userId}`);
            
            ws.onopen = () => {
                document.getElementById('status').innerHTML = 'Connected';
                document.getElementById('status').style.backgroundColor = '#c8e6c9';
                addMessage('System', 'Connected to chat server');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
            
            ws.onclose = () => {
                document.getElementById('status').innerHTML = 'Disconnected';
                document.getElementById('status').style.backgroundColor = '#ffcdd2';
                addMessage('System', 'Disconnected from server');
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addMessage('Error', 'Connection error');
            };
        }
        
        function handleMessage(data) {
            if (data.type === 'new_message') {
                const msg = data.data;
                const isOwn = msg.sender_id == userId;
                addMessage(
                    isOwn ? 'You' : `User ${msg.sender_id}`,
                    msg.content,
                    !isOwn
                );
            } else if (data.type === 'offline_messages') {
                addMessage('System', `Received ${data.data.count} offline messages`);
                data.data.messages.forEach(msg => {
                    addMessage(`User ${msg.sender_id} (offline)`, msg.content);
                });
            } else if (data.type === 'message_sent') {
                addMessage('System', 'Message sent successfully');
            } else if (data.type === 'typing_indicator') {
                const isTyping = data.data.is_typing;
                if (isTyping) {
                    addMessage('System', `User ${data.data.user_id} is typing...`);
                }
            }
        }
        
        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Not connected');
                return;
            }
            
            const receiverId = document.getElementById('receiverId').value;
            const message = document.getElementById('messageInput').value;
            
            if (!receiverId || !message) {
                alert('Please enter receiver ID and message');
                return;
            }
            
            const data = {
                type: 'chat',
                data: {
                    content: message,
                    receiver_id: parseInt(receiverId)
                }
            };
            
            ws.send(JSON.stringify(data));
            document.getElementById('messageInput').value = '';
            
            // Show message immediately
            addMessage('You (sending)', message);
        }
        
        function addMessage(sender, content, isOther = false) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOther ? 'other-message' : 'own-message'}`;
            messageDiv.innerHTML = `<strong>${sender}:</strong> ${content}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
